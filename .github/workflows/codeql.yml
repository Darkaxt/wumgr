name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '31 3 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: windows-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: github/codeql-action/init@v4
        with:
          languages: csharp
      - name: Build
        run: msbuild wumgr.sln /restore /p:Configuration=Release /p:Platform="Any CPU" /m
      - uses: github/codeql-action/analyze@v4
